version: "2"
run:
  go: "1.22"
  modules-download-mode: readonly
  tests: true
linters:
  enable:
    - bodyclose
    - errchkjson
    - goconst
    - gosec
    - misspell
    - revive
    - sqlclosecheck
    - whitespace
  settings:
    errcheck:
      check-type-assertions: true
      exclude-functions:
        - encoding/json.Marshal
        - encoding/json.MarshalIndent
    errchkjson:
      check-error-free-encoding: true
    goconst:
      min-occurrences: 3
    govet:
      enable:
        - assign
        - bools
        - buildtag
        - defers
        - httpresponse
        - nilfunc
        - nilness
        - shadow
        - stringintconv
        - testinggoroutine
        - tests
        - unmarshal
        - unreachable
        - unsafeptr
        - unusedresult
        - waitgroup
    revive:
      rules:
        - name: exported
          severity: warning
          disabled: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gosec
        path: _test\.go
    paths:
      - .*_test\.go$
      - vendor
      - testdata
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  fix: false
severity:
  default: error
  rules:
    - linters:
        - revive
      severity: warning
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/referendumApp/referendumServices
  exclusions:
    generated: lax
    paths:
      - .*_test\.go$
      - vendor
      - testdata
      - third_party$
      - builtin$
      - examples$
